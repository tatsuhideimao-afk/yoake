name: yoake-cleanup

# 毎日 古いデータ（夜明けで終わった夜のバケツ）をRESTで削除する。
# Cloud Functions も Blaze プランも CLI も不要。スマホだけで設定できる。
on:
  schedule:
    - cron: "0 20 * * *"   # 毎日 20:00 UTC（= 翌05:00 JST、日の出後）に実行
  workflow_dispatch: {}      # Actions画面から手動実行も可（テスト用）

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old day-buckets via Realtime Database REST
        env:
          # この2つは公開して問題ない値（firebase-config.js と同じもの）
          API_KEY: "AIzaSyCQ59pZLkudeLCZg8549RxeXUsuJmecI70"
          DB_URL: "https://yoake-3c45d-default-rtdb.asia-southeast1.firebasedatabase.app"
        run: |
          set -euo pipefail

          # 1) 匿名サインインして idToken を取得（アプリと同じ匿名ログイン）
          ID_TOKEN=$(curl -s -X POST \
            "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"returnSecureToken":true}' | jq -r '.idToken')
          if [ -z "${ID_TOKEN}" ] || [ "${ID_TOKEN}" = "null" ]; then
            echo "anonymous sign-in failed"; exit 1
          fi

          # 2) しきい値 = 昨日(JST)。これより古いキーだけ削除する。
          #    （進行中の夜のバケツは今日 or 昨日の日付なので、必ず残す）
          THRESHOLD=$(TZ=Asia/Tokyo date -d 'yesterday' +%Y-%m-%d)
          echo "Keeping buckets >= ${THRESHOLD}"

          # 3) dayIndex のキー一覧（YYYY-MM-DD）を取得
          KEYS=$(curl -s "${DB_URL}/dayIndex.json?shallow=true&auth=${ID_TOKEN}" \
            | jq -r 'if . == null then empty else keys[] end')

          DELETED=0
          for K in ${KEYS}; do
            if [[ "${K}" < "${THRESHOLD}" ]]; then
              echo "Deleting days/${K}"
              curl -s -X DELETE "${DB_URL}/days/${K}.json?auth=${ID_TOKEN}" >/dev/null
              curl -s -X DELETE "${DB_URL}/dayIndex/${K}.json?auth=${ID_TOKEN}" >/dev/null
              DELETED=$((DELETED+1))
            fi
          done
          echo "Done. Deleted ${DELETED} old bucket(s)."
